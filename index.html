<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#121212"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Daily App"/>
<title>My Daily App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,Roboto,sans-serif;background:#121212;color:#fff;min-height:100vh;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Splash */
#splash{position:fixed;inset:0;background:#121212;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.sp-logo{width:78px;height:78px;border-radius:20px;background:linear-gradient(135deg,#1D9E75,#185FA5);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.sp-name{font-size:23px;font-weight:700;}
.sp-sub{font-size:12px;color:#555;margin-top:4px;}

/* Auth */
#authWrap{display:none;flex-direction:column;min-height:100vh;background:linear-gradient(160deg,#0d1b0d,#0d1a2a);}
.auth-top{padding:46px 24px 22px;text-align:center;}
.auth-logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#1D9E75,#185FA5);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.auth-name{font-size:21px;font-weight:700;}
.auth-tag{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px;}
.auth-card{background:#1a1a1a;border-radius:22px 22px 0 0;flex:1;padding:22px 20px 36px;border-top:1px solid #2a2a2a;}
.auth-tabs{display:flex;background:#0f0f0f;border-radius:11px;padding:4px;margin-bottom:18px;}
.auth-tab{flex:1;padding:9px;border:none;background:none;font-size:13px;font-weight:600;color:#555;border-radius:8px;}
.auth-tab.on{background:#1D9E75;color:#fff;}
.fld{margin-bottom:11px;}
.fld-lbl{font-size:11px;font-weight:600;color:#666;margin-bottom:4px;}
.fld-inp{width:100%;font-size:14px;padding:11px 13px;border:1.5px solid #2a2a2a;border-radius:10px;background:#0f0f0f;color:#fff;outline:none;}
.fld-inp.err{border-color:#E24B4A;}
.fld-msg{font-size:11px;margin-top:3px;min-height:14px;color:#E24B4A;}
.auth-btn{width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;margin-top:5px;}
.sw-link{text-align:center;font-size:12px;color:#555;margin-top:13px;}
.sw-link b{color:#1D9E75;font-weight:700;}

/* Top bar */
.topbar{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 16px 0;position:sticky;top:0;z-index:50;}
.tb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tb-title{font-size:15px;font-weight:700;}
.score-chip{background:#1a1800;color:#f7c948;border:1px solid #3a3010;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.user-btn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1D9E75,#185FA5);border:none;color:#fff;font-size:13px;font-weight:700;}
.tab-bar{display:flex;}
.tab-btn{flex:1;padding:9px 4px;border:none;background:none;font-size:11px;font-weight:600;color:#555;border-bottom:3px solid transparent;text-align:center;}
.tab-btn.on{color:#1D9E75;border-bottom-color:#1D9E75;}
.tab-btn svg{display:block;margin:0 auto 3px;}

.content{flex:1;padding:14px 14px 24px;}
.screen{display:none;}
.screen.on{display:block;}
.card{background:#1E1E1E;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;margin-bottom:12px;}

/* Points banner */
.pbanner{background:#1a1800;border:1px solid #3a3010;border-radius:12px;padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.plvl{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#f7c948;color:#5a3500;flex-shrink:0;}

/* Today / activities */
.add-row{display:flex;gap:8px;margin-bottom:10px;}
.add-inp{flex:1;font-size:13px;padding:10px 12px;border:1px solid #333;border-radius:10px;background:#0f0f0f;color:#fff;outline:none;}
.gbtn{background:#1D9E75;border:none;border-radius:10px;padding:10px 14px;font-size:13px;color:#fff;font-weight:700;}
.row{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid #222;}
.row:last-child{border-bottom:none;}
.row.done{background:#0a1a0a;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:13px;font-weight:500;}
.rname.strike{text-decoration:line-through;color:#1D9E75;}
.circle{width:27px;height:27px;border-radius:50%;border:2px solid #333;background:none;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;}
.circle.chk{background:#1D9E75;border-color:#1D9E75;}
.dbtn{background:#1a0d0d;border:1px solid #3a1a1a;border-radius:8px;width:30px;height:30px;color:#E24B4A;font-size:15px;flex-shrink:0;}
.pts-tag{font-size:10px;font-weight:700;color:#c7a000;background:#1a1800;padding:2px 7px;border-radius:9px;flex-shrink:0;}
.empty-state{padding:30px 16px;text-align:center;color:#444;font-size:12px;}

/* GPS */
.gcard{background:#0d1a0d;border:1px solid #1a3a1a;border-radius:14px;padding:13px;margin-bottom:12px;}
.atypes{display:flex;gap:6px;margin-bottom:10px;}
.atype{flex:1;padding:8px 3px;border:2px solid #2a2a2a;border-radius:10px;background:#0f0f0f;font-size:11px;text-align:center;color:#555;}
.atype.sel{border-color:#1D9E75;background:#0d1a0d;color:#1D9E75;}
.gstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.gs{background:#0f0f0f;border-radius:11px;padding:10px;text-align:center;border:1px solid #1a3a1a;}
.gsv{font-size:18px;font-weight:700;color:#1D9E75;}
.gsl{font-size:10px;color:#444;margin-top:2px;}
.gbtns{display:flex;gap:8px;}
.gactbtn{flex:1;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:700;}
.ggo{background:#1D9E75;color:#fff;}
.gpause{background:#EF9F27;color:#fff;}
.gstop{background:#0f0f0f;color:#E24B4A;border:2px solid #E24B4A;width:52px;flex:none;}
.gpw{background:#1a3a1a;border-radius:99px;height:6px;overflow:hidden;margin-bottom:9px;}
.gpf{height:100%;background:#1D9E75;border-radius:99px;}
.gerr{font-size:11px;color:#EF9F27;text-align:center;padding:8px;background:#1a1500;border-radius:9px;margin-bottom:9px;}

/* Profile modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.mb{background:#1a1a1a;border-radius:20px 20px 0 0;padding:18px 17px 30px;width:100%;max-width:430px;border-top:1px solid #2a2a2a;}
.logout-btn{width:100%;padding:12px;background:#1a0d0d;color:#E24B4A;border:none;border-radius:12px;font-size:14px;font-weight:700;margin-top:14px;}

/* Milestone */
.ms-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.ms-box{background:#1a1a1a;border-radius:22px;padding:26px 18px 20px;max-width:280px;width:100%;text-align:center;border:1px solid #2a2a2a;}
.msave{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;}
.gopts{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:15px;}
.gopt{padding:9px 3px;border:1.5px solid #2a2a2a;border-radius:9px;background:#0f0f0f;font-size:11px;text-align:center;color:#fff;}
.gopt.sel{border-color:#1D9E75;background:#0d1a0d;color:#1D9E75;}
.mcancel{width:100%;padding:9px;background:none;color:#555;border:none;font-size:13px;margin-top:5px;}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo"><svg viewBox="0 0 24 24" width="42" height="42" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
  <div class="sp-name">My Daily App</div>
  <div class="sp-sub">Loading...</div>
</div>

<div id="authWrap">
  <div class="auth-top">
    <div class="auth-logo"><svg viewBox="0 0 24 24" width="34" height="34" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
    <div class="auth-name">My Daily App</div>
    <div class="auth-tag">Activities &amp; Distance Tracker</div>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab on" id="atab0" onclick="switchAuth('login')">Sign In</button>
      <button class="auth-tab" id="atab1" onclick="switchAuth('signup')">Create Account</button>
    </div>
    <div id="authArea"></div>
  </div>
</div>

<div id="mainApp" class="app" style="display:none">
  <div class="topbar">
    <div class="tb-row">
      <div class="tb-title">My Daily App</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="score-chip" id="scoreChip">0 pts</div>
        <button class="user-btn" id="userBtn" onclick="openProfile()">U</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn on" id="tb0" onclick="showTab('today',0)">
        <svg viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Activities
      </button>
      <button class="tab-btn" id="tb1" onclick="showTab('gps',1)">
        <svg viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0zM12 13a3 3 0 110-6 3 3 0 010 6z"/></svg>
        Distance
      </button>
    </div>
  </div>

  <div class="content">
    <div id="tab-today" class="screen on">
      <div class="pbanner">
        <div class="plvl" id="plvl">Beginner</div>
        <div style="font-size:11px;color:#ccc;flex:1" id="pmsg">Complete tasks to earn points!</div>
      </div>
      <div class="add-row">
        <input class="add-inp" id="newActInp" placeholder="Add activity..." onkeydown="if(event.key==='Enter')addAct()"/>
        <button class="gbtn" onclick="addAct()">Add</button>
      </div>
      <div class="card" id="actList"></div>
    </div>

    <div id="tab-gps" class="screen">
      <div class="gcard">
        <div class="atypes">
          <button class="atype sel" id="at0" onclick="setAType('walk')">Walk</button>
          <button class="atype" id="at1" onclick="setAType('run')">Run</button>
          <button class="atype" id="at2" onclick="setAType('cycle')">Cycle</button>
        </div>
        <div id="gpsErrArea"></div>
        <div class="gstats">
          <div class="gs"><div class="gsv" id="gDist">0.00</div><div class="gsl">km</div></div>
          <div class="gs"><div class="gsv" id="gTime">00:00</div><div class="gsl">time</div></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;color:#1D9E75;font-weight:700" id="gGoalLbl">Goal: 5 km</span>
          <button onclick="openDGoal()" style="background:none;border:none;color:#1D9E75;font-size:11px;font-weight:700">Edit</button>
        </div>
        <div class="gpw"><div class="gpf" id="gpFill" style="width:0%"></div></div>
        <div class="gbtns" id="gpsBtns">
          <button class="gactbtn ggo" onclick="startGPS()">Start Tracking</button>
        </div>
      </div>
      <div class="card" id="gHistCard">
        <div style="padding:11px 13px;font-size:12px;font-weight:700;border-bottom:1px solid #222">Today's Sessions</div>
        <div id="gHistList"></div>
      </div>
    </div>
  </div>
</div>

<div class="ov" id="profileOv" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="mb">
    <div style="display:flex;align-items:center;gap:12px;padding-bottom:13px;border-bottom:1px solid #222;margin-bottom:13px;">
      <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#1D9E75,#185FA5);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0" id="profileAvatar">U</div>
      <div>
        <div style="font-size:14px;font-weight:700" id="profileName">User</div>
        <div style="font-size:11px;color:#555;margin-top:2px" id="profileEmail"></div>
      </div>
    </div>
    <div style="font-size:11px;color:#555;text-align:center;margin-bottom:10px" id="profilePts">0 pts today</div>
    <div style="border-top:1px solid #222;padding-top:13px;margin-top:3px">
      <div style="font-size:12px;font-weight:700;margin-bottom:9px">Daily Reminder</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <span style="font-size:12px;color:#ccc">Enable notifications</span>
        <button id="notifToggle" onclick="toggleNotif()" style="width:44px;height:24px;border-radius:99px;border:none;background:#333;position:relative;flex-shrink:0">
          <span id="notifKnob" style="position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s"></span>
        </button>
      </div>
      <div id="notifTimeRow" style="display:none;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#ccc">Reminder time</span>
        <input type="time" id="notifTimeInp" value="19:00" onchange="setNotifTime()" style="background:#0f0f0f;border:1px solid #333;border-radius:8px;padding:6px 9px;color:#fff;font-size:12px"/>
      </div>
      <div style="font-size:10px;color:#444;margin-top:6px" id="notifStatus"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="ov" id="dGoalOv" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="mb">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">Distance goal (km)</div>
    <div class="gopts" id="dGoalOpts"></div>
    <button class="msave" onclick="saveDGoal()">Save</button>
    <button class="mcancel" onclick="document.getElementById('dGoalOv').style.display='none'">Cancel</button>
  </div>
</div>

<div class="ms-ov" id="msOv" style="display:none">
  <div class="ms-box">
    <div style="font-size:54px;margin-bottom:8px" id="msEmoji">🎉</div>
    <div style="font-size:25px;font-weight:700;margin-bottom:4px" id="msPct">100%</div>
    <div style="font-size:13px;margin-bottom:4px" id="msMsg">Goal reached!</div>
    <div style="font-size:11px;color:#555;margin-bottom:14px" id="msSub">Great job!</div>
    <button class="msave" onclick="document.getElementById('msOv').style.display='none'">Keep Going</button>
  </div>
</div>

<script>

/* ===== Storage with fallback ===== */
var _mem = {};
var _useLS = true;
try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); } catch(e) { _useLS = false; }

function ls(k){
  if(_useLS){ try { return localStorage.getItem(k); } catch(e){} }
  return _mem[k] || null;
}
function ss(k,v){
  if(_useLS){ try { localStorage.setItem(k,v); return; } catch(e){} }
  _mem[k] = v;
}
function rd(k){
  if(_useLS){ try { localStorage.removeItem(k); } catch(e){} }
  delete _mem[k];
}

/* ===== Auth helpers ===== */
function hash(str){
  var h = 5381;
  for(var i=0; i<str.length; i++){
    h = ((h << 5) + h) + str.charCodeAt(i);
    h = h & h;
  }
  return String(h);
}
function isEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }
function isMobile(s){ return /^[0-9]{10}$/.test(s); }

function getUsers(){
  try { var v = ls('da_users'); return v ? JSON.parse(v) : {}; } catch(e){ return {}; }
}
function saveUsers(u){ ss('da_users', JSON.stringify(u)); }

function getSession(){
  try { var s = ls('da_session'); return s ? JSON.parse(s) : null; } catch(e){ return null; }
}
function saveSession(u){
  ss('da_session', JSON.stringify({ email: u.email, name: u.name }));
}
function clearSession(){ rd('da_session'); }

function findUser(idVal){
  var users = getUsers();
  if(users[idVal]) return users[idVal];
  for(var k in users){
    if(users[k].mobile === idVal) return users[k];
  }
  return null;
}

/* ===== Per-user data keys ===== */
var curUser = null;
function uKey(suffix){
  var em = curUser ? curUser.email : 'guest';
  return 'da_' + em + '_' + suffix;
}
function uls(suffix){ return ls(uKey(suffix)); }
function uss(suffix, v){ ss(uKey(suffix), v); }

function loadJ(key, dflt){
  try { var v = uls(key); return v ? JSON.parse(v) : dflt; } catch(e){ return dflt; }
}
function saveJ(key, v){ uss(key, JSON.stringify(v)); }

/* ===== Auth UI ===== */
var authMode = 'login';

function switchAuth(m){
  authMode = m;
  document.getElementById('atab0').classList.toggle('on', m === 'login');
  document.getElementById('atab1').classList.toggle('on', m === 'signup');
  renderAuth();
}

function renderAuth(){
  var area = document.getElementById('authArea');
  if(!area) return;
  if(authMode === 'login'){
    area.innerHTML =
      '<div class="fld"><div class="fld-lbl">Email or Mobile</div>' +
      '<input class="fld-inp" id="li-id" placeholder="you@email.com or 9876543210"/>' +
      '<div class="fld-msg" id="li-id-msg"></div></div>' +
      '<div class="fld"><div class="fld-lbl">Password</div>' +
      '<input class="fld-inp" id="li-pw" type="password" placeholder="Your password"/>' +
      '<div class="fld-msg" id="li-pw-msg"></div></div>' +
      '<button class="auth-btn" onclick="doLogin()">Sign In</button>' +
      '<div class="sw-link">New here? <b onclick="switchAuth(\'signup\')">Create account</b></div>';
  } else {
    area.innerHTML =
      '<div class="fld"><div class="fld-lbl">Full Name</div>' +
      '<input class="fld-inp" id="su-name" placeholder="Your name"/>' +
      '<div class="fld-msg" id="su-name-msg"></div></div>' +
      '<div class="fld"><div class="fld-lbl">Email</div>' +
      '<input class="fld-inp" id="su-email" placeholder="you@email.com"/>' +
      '<div class="fld-msg" id="su-email-msg"></div></div>' +
      '<div class="fld"><div class="fld-lbl">Mobile Number</div>' +
      '<input class="fld-inp" id="su-mobile" placeholder="9876543210"/>' +
      '<div class="fld-msg" id="su-mobile-msg"></div></div>' +
      '<div class="fld"><div class="fld-lbl">Password</div>' +
      '<input class="fld-inp" id="su-pw" type="password" placeholder="Min 6 characters"/>' +
      '<div class="fld-msg" id="su-pw-msg"></div></div>' +
      '<button class="auth-btn" onclick="doSignup()">Create Account</button>' +
      '<div class="sw-link">Already have an account? <b onclick="switchAuth(\'login\')">Sign in</b></div>';
  }
}

function setErr(id, msg){
  var inp = document.getElementById(id);
  var msgEl = document.getElementById(id + '-msg');
  if(inp) inp.classList.toggle('err', !!msg);
  if(msgEl) msgEl.textContent = msg || '';
}

function doLogin(){
  var idVal = (document.getElementById('li-id').value || '').trim();
  var pw = document.getElementById('li-pw').value || '';
  setErr('li-id',''); setErr('li-pw','');
  if(!idVal){ setErr('li-id','Enter email or mobile number'); return; }
  var user = findUser(idVal);
  if(!user){ setErr('li-id','No account found'); return; }
  if(user.pw !== hash(pw)){ setErr('li-pw','Incorrect password'); return; }
  loginUser(user);
}

function doSignup(){
  var name = (document.getElementById('su-name').value || '').trim();
  var email = (document.getElementById('su-email').value || '').trim().toLowerCase();
  var mobile = (document.getElementById('su-mobile').value || '').trim();
  var pw = document.getElementById('su-pw').value || '';
  setErr('su-name',''); setErr('su-email',''); setErr('su-mobile',''); setErr('su-pw','');
  var ok = true;
  if(!name){ setErr('su-name','Enter your name'); ok = false; }
  if(!isEmail(email)){ setErr('su-email','Enter a valid email'); ok = false; }
  if(!isMobile(mobile)){ setErr('su-mobile','Enter 10-digit mobile number'); ok = false; }
  if(pw.length < 6){ setErr('su-pw','Min 6 characters'); ok = false; }
  if(!ok) return;
  var users = getUsers();
  if(users[email]){ setErr('su-email','Account already exists'); return; }
  var user = { name: name, email: email, mobile: mobile, pw: hash(pw) };
  users[email] = user;
  saveUsers(users);
  loginUser(user);
}

function loginUser(user){
  curUser = user;
  saveSession(user);
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  var initials = (user.name || 'U').charAt(0).toUpperCase();
  document.getElementById('userBtn').textContent = initials;
  loadActData();
  loadGData();
  renderToday();
  renderGPS();
  scheduleNotif();
}

function doLogout(){
  clearSession();
  curUser = null;
  document.getElementById('profileOv').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('authWrap').style.display = 'flex';
  switchAuth('login');
}

function openProfile(){
  if(!curUser) return;
  document.getElementById('profileAvatar').textContent = (curUser.name||'U').charAt(0).toUpperCase();
  document.getElementById('profileName').textContent = curUser.name || 'User';
  document.getElementById('profileEmail').textContent = curUser.email || '';

/* ===== Tabs ===== */
function showTab(name, idx){
  document.getElementById('tab-today').classList.toggle('on', name === 'today');
  document.getElementById('tab-gps').classList.toggle('on', name === 'gps');
  document.getElementById('tb0').classList.toggle('on', idx === 0);
  document.getElementById('tb1').classList.toggle('on', idx === 1);
  if(name === 'today') renderToday();
  else if(name === 'gps') renderGPS();

/* ===== Date helpers ===== */
function tKey(){
  var d = new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).length===1 ? '0'+(d.getMonth()+1) : (d.getMonth()+1);
  var dd = String(d.getDate()).length===1 ? '0'+d.getDate() : d.getDate();
  return y + '-' + m + '-' + dd;
}

/* ===== Activities (Today tab) ===== */
var DEFACTS = ['Drink water','Morning walk','Read 20 mins','Stretch / exercise','Healthy breakfast','No junk food','Sleep by 10:30pm','Plan tomorrow'];
var actData = {};

function loadActData(){
  actData = loadJ('acts', {});
}
function saveActData(){
  saveJ('acts', actData);
}

function getDay(key){
  if(!actData[key]){
    var list = [];
    for(var i=0; i<DEFACTS.length; i++){
      list.push({ id: i+1, name: DEFACTS[i], done: false });
    }
    actData[key] = { activities: list };
    saveActData();
  }
  return actData[key];
}

function nextActId(key){
  var day = getDay(key);
  var max = 0;
  for(var i=0; i<day.activities.length; i++){
    if(day.activities[i].id > max) max = day.activities[i].id;
  }
  return max + 1;
}

function addAct(){
  var inp = document.getElementById('newActInp');
  var name = (inp.value || '').trim();
  if(!name) return;
  var key = tKey();
  var day = getDay(key);
  day.activities.push({ id: nextActId(key), name: name, done: false });
  saveActData();
  inp.value = '';
  renderToday();
}

function toggleAct(id){
  var key = tKey();
  var day = getDay(key);
  for(var i=0; i<day.activities.length; i++){
    if(day.activities[i].id === id){
      day.activities[i].done = !day.activities[i].done;
    }
  }
  saveActData();
  renderToday();
}

function delAct(id){
  var key = tKey();
  var day = getDay(key);
  var newList = [];
  for(var i=0; i<day.activities.length; i++){
    if(day.activities[i].id !== id) newList.push(day.activities[i]);
  }
  day.activities = newList;
  saveActData();
  renderToday();
}

function todayPts(){
  var key = tKey();
  var day = getDay(key);
  var pts = 0;
  for(var i=0; i<day.activities.length; i++){
    if(day.activities[i].done) pts += 5;
  }
  var gdata = gData[key];
  if(gdata && gdata.sessions){
    pts += gdata.sessions.length * 10;
  }
  return pts;
}

function levelInfo(pts){
  if(pts >= 100) return { name: 'Legend', color: '#9b59b6' };
  if(pts >= 60) return { name: 'Champion', color: '#f7c948' };
  if(pts >= 35) return { name: 'Warrior', color: '#e67e22' };
  if(pts >= 15) return { name: 'Active', color: '#3498db' };
  return { name: 'Beginner', color: '#1D9E75' };
}

function renderToday(){
  var key = tKey();
  var day = getDay(key);
  var pts = todayPts();
  var lvl = levelInfo(pts);

  document.getElementById('scoreChip').textContent = pts + ' pts';
  document.getElementById('plvl').textContent = lvl.name;
  document.getElementById('plvl').style.background = lvl.color;

  var doneCount = 0;
  for(var i=0; i<day.activities.length; i++){
    if(day.activities[i].done) doneCount++;
  }
  document.getElementById('pmsg').textContent = doneCount + ' of ' + day.activities.length + ' tasks done today';

  var html = '';
  if(day.activities.length === 0){
    html = '<div class="empty-state">No activities yet. Add one above!</div>';
  } else {
    for(var i=0; i<day.activities.length; i++){
      var a = day.activities[i];
      html += '<div class="row ' + (a.done ? 'done' : '') + '">';
      html += '<button class="circle ' + (a.done ? 'chk' : '') + '" onclick="toggleAct(' + a.id + ')">' + (a.done ? '&#10003;' : '') + '</button>';
      html += '<div class="rinfo"><div class="rname ' + (a.done ? 'strike' : '') + '">' + escHtml(a.name) + '</div></div>';
      if(a.done) html += '<div class="pts-tag">+5</div>';
      html += '<button class="dbtn" onclick="delAct(' + a.id + ')">&#10005;</button>';
      html += '</div>';
    }
  }
  document.getElementById('actList').innerHTML = html;
}

function escHtml(s){
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

/* ===== GPS Distance Tracker ===== */
var aType = 'walk';
var dGoal = 5;
var gData = {};
var gpsOn = false;
var gpsPaused = false;
var gpsWatch = null;
var gpsTimer = null;
var gpsDist = 0;
var gpsStart = 0;
var gpsPausedMs = 0;
var gpsPauseAt = null;
var gpsPos = [];
var msDone = {};
var gpsErrMsg = '';

function loadGData(){
  gData = loadJ('gps', {});
  var goal = loadJ('dgoal', null);
  if(goal) dGoal = goal;
}
function saveGData(){ saveJ('gps', gData); }

function setAType(t){
  aType = t;
  document.getElementById('at0').classList.toggle('sel', t === 'walk');
  document.getElementById('at1').classList.toggle('sel', t === 'run');
  document.getElementById('at2').classList.toggle('sel', t === 'cycle');
}

function haversine(la1, lo1, la2, lo2){
  var R = 6371000;
  var dLa = (la2-la1) * Math.PI/180;
  var dLo = (lo2-lo1) * Math.PI/180;
  var a = Math.sin(dLa/2)*Math.sin(dLa/2) + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);
  var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

function fmtTime(ms){
  var totalSec = Math.floor(ms/1000);
  var mm = Math.floor(totalSec/60);
  var ss = totalSec % 60;
  var mmStr = mm < 10 ? '0'+mm : ''+mm;
  var ssStr = ss < 10 ? '0'+ss : ''+ss;
  return mmStr + ':' + ssStr;
}

function startGPS(){
  if(!navigator.geolocation){
    gpsErrMsg = 'GPS not supported on this browser.';
    renderGPS();
    return;
  }
  gpsErrMsg = 'Requesting location permission...';
  renderGPS();

  navigator.geolocation.getCurrentPosition(
    function(pos){
      gpsErrMsg = '';
      gpsOn = true;
      gpsPaused = false;
      gpsDist = 0;
      gpsPos = [];
      gpsStart = Date.now();
      gpsPausedMs = 0;
      gpsPauseAt = null;
      msDone = {};
      gpsPos.push({ la: pos.coords.latitude, lo: pos.coords.longitude });

      gpsWatch = navigator.geolocation.watchPosition(
        function(pos2){
          if(gpsPaused) return;
          if(gpsPos.length > 0){
            var p = gpsPos[gpsPos.length-1];
            var d = haversine(p.la, p.lo, pos2.coords.latitude, pos2.coords.longitude);
            if(d > 1 && d < 500) gpsDist += d;
          }
          gpsPos.push({ la: pos2.coords.latitude, lo: pos2.coords.longitude });
          checkMs(Math.min(100, Math.round((gpsDist/1000)/dGoal*100)));
          renderGPS();
        },
        function(err){
          var msgs = { 1: 'Permission denied', 2: 'Signal lost - move to open area', 3: 'GPS timeout' };
          gpsErrMsg = 'Error: ' + (msgs[err.code] || 'GPS error');
          renderGPS();
        },
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 20000 }
      );

      gpsTimer = setInterval(function(){
        if(!gpsPaused) renderGPS();
      }, 1000);
      renderGPS();
    },
    function(err){
      if(err.code === 1){
        gpsErrMsg = 'Location permission denied. Enable it in your browser site settings.';
      } else if(err.code === 2){
        gpsErrMsg = 'Could not get location. Move to an open area and try again.';
      } else {
        gpsErrMsg = 'GPS timed out. Please try again.';
      }
      renderGPS();
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function pauseGPS(){
  gpsPaused = !gpsPaused;
  if(gpsPaused){
    gpsPauseAt = Date.now();
  } else {
    if(gpsPauseAt){
      gpsPausedMs += Date.now() - gpsPauseAt;
      gpsPauseAt = null;
    }
  }
  renderGPS();
}

function stopGPS(){
  if(gpsWatch !== null){
    navigator.geolocation.clearWatch(gpsWatch);
    gpsWatch = null;
  }
  if(gpsTimer !== null){
    clearInterval(gpsTimer);
    gpsTimer = null;
  }
  var elapsed = Date.now() - gpsStart - gpsPausedMs;
  var key = tKey();
  if(!gData[key]) gData[key] = { sessions: [] };
  if(gpsDist > 10){
    gData[key].sessions.push({
      type: aType,
      dist: gpsDist,
      time: elapsed,
      at: new Date().toISOString()
    });
    saveGData();
  }
  gpsOn = false;
  gpsPaused = false;
  gpsDist = 0;
  gpsPos = [];
  msDone = {};
  gpsErrMsg = '';
  renderGPS();
}

function checkMs(pct){
  var milestones = [25, 50, 75, 90, 100];
  for(var i=0; i<milestones.length; i++){
    var m = milestones[i];
    if(pct >= m && !msDone[m]){
      msDone[m] = true;
      showMs(m);
    }
  }
}

function showMs(pct){
  var emojis = { 25: '\u{1F44D}', 50: '\u{1F525}', 75: '\u{1F981}', 90: '\u{1F680}', 100: '\u{1F3C6}' };
  var msgs = { 25: 'Quarter way there!', 50: 'Halfway done!', 75: 'Almost there!', 90: 'Final push!', 100: 'Goal achieved!' };
  document.getElementById('msEmoji').textContent = emojis[pct] || '\u{1F389}';
  document.getElementById('msPct').textContent = pct + '%';
  document.getElementById('msMsg').textContent = msgs[pct] || 'Great job!';
  document.getElementById('msSub').textContent = 'Keep up the great work!';
  document.getElementById('msOv').style.display = 'flex';
}

function openDGoal(){
  var opts = [1,2,3,5,10];
  var html = '';
  for(var i=0; i<opts.length; i++){
    html += '<button class="gopt ' + (opts[i]===dGoal?'sel':'') + '" data-val="' + opts[i] + '" onclick="selDGoalOpt(' + opts[i] + ')">' + opts[i] + '</button>';
  }
  document.getElementById('dGoalOpts').innerHTML = html;
  document.getElementById('dGoalOv').style.display = 'flex';
}
var _tempDGoal = null;
function selDGoalOpt(v){
  _tempDGoal = v;
  var btns = document.querySelectorAll('#dGoalOpts .gopt');
  for(var i=0; i<btns.length; i++){
    btns[i].classList.toggle('sel', parseInt(btns[i].getAttribute('data-val')) === v);
  }
}
function saveDGoal(){
  if(_tempDGoal !== null) dGoal = _tempDGoal;
  saveJ('dgoal', dGoal);
  document.getElementById('dGoalOv').style.display = 'none';
  renderGPS();
}

function renderGPS(){
  var km = gpsDist / 1000;
  document.getElementById('gDist').textContent = km.toFixed(2);

  var elapsed = gpsOn ? (Date.now() - gpsStart - gpsPausedMs - (gpsPaused && gpsPauseAt ? (Date.now()-gpsPauseAt) : 0)) : 0;
  document.getElementById('gTime').textContent = fmtTime(Math.max(0,elapsed));

  document.getElementById('gGoalLbl').textContent = 'Goal: ' + dGoal + ' km';
  var pct = Math.min(100, Math.round(km/dGoal*100));
  document.getElementById('gpFill').style.width = pct + '%';

  var errArea = document.getElementById('gpsErrArea');
  errArea.innerHTML = gpsErrMsg ? '<div class="gerr">' + escHtml(gpsErrMsg) + '</div>' : '';

  var btnArea = document.getElementById('gpsBtns');
  if(!gpsOn){
    btnArea.innerHTML = '<button class="gactbtn ggo" onclick="startGPS()">Start Tracking</button>';
  } else {
    btnArea.innerHTML =
      '<button class="gactbtn gpause" onclick="pauseGPS()">' + (gpsPaused ? 'Resume' : 'Pause') + '</button>' +
      '<button class="gactbtn gstop" onclick="stopGPS()">Stop</button>';
  }

  renderGHist();
}

function renderGHist(){
  var key = tKey();
  var day = gData[key];
  var html = '';
  if(!day || !day.sessions || day.sessions.length === 0){
    html = '<div class="empty-state">No sessions yet today</div>';
  } else {
    for(var i=0; i<day.sessions.length; i++){
      var s = day.sessions[i];
      var km = (s.dist/1000).toFixed(2);
      var icons = { walk: '\u{1F6B6}', run: '\u{1F3C3}', cycle: '\u{1F6B4}' };
      html += '<div class="row">';
      html += '<div style="font-size:20px;flex-shrink:0">' + (icons[s.type] || '\u{1F6B6}') + '</div>';
      html += '<div class="rinfo"><div class="rname" style="text-transform:capitalize">' + s.type + '</div>' +
              '<div style="font-size:10px;color:#555;margin-top:2px">' + fmtTime(s.time) + '</div></div>';
      html += '<div style="font-size:13px;font-weight:700;color:#1D9E75">' + km + ' km</div>';
      html += '</div>';
    }
  }
  document.getElementById('gHistList').innerHTML = html;
}

  var splash = document.getElementById('splash');

    if(users[session.email]){
      loginUser(users[session.email]);
      return;
    }
  }

  document.getElementById('authWrap').style.display = 'flex';
  renderAuth();
}

function setupPWA(){
  registerServiceWorker();
}

function registerServiceWorker(){
  if(!("serviceWorker" in navigator)) return;
  try{
    navigator.serviceWorker.register("sw.js").then(function(reg){
      console.log("Service worker registered");
    }).catch(function(err){
      console.log("SW registration failed: " + err.message);
    });
  }catch(e){
    console.log("SW setup error: " + e.message);
  }
}

/* ===== Notifications ===== */
var notifTimer = null;

function loadNotifSettings(){
  var s = loadJ("notif", { enabled: false, time: "19:00" });
  return s;
}
function saveNotifSettings(s){ saveJ("notif", s); }

function renderNotifUI(){
  var s = loadNotifSettings();
  var knob = document.getElementById("notifKnob");
  var toggle = document.getElementById("notifToggle");
  var timeRow = document.getElementById("notifTimeRow");
  var timeInp = document.getElementById("notifTimeInp");
  var status = document.getElementById("notifStatus");

  if(s.enabled){
    if(knob) knob.style.left = "22px";
    if(toggle) toggle.style.background = "#1D9E75";
    if(timeRow) timeRow.style.display = "flex";
  } else {
    if(knob) knob.style.left = "2px";
    if(toggle) toggle.style.background = "#333";
    if(timeRow) timeRow.style.display = "none";
  }
  if(timeInp) timeInp.value = s.time;

  if(status){
    if(!("Notification" in window)){
      status.textContent = "Notifications not supported on this browser";
    } else if(Notification.permission === "denied"){
      status.textContent = "Notifications blocked. Enable in browser site settings.";
    } else if(s.enabled){
      status.textContent = "Daily reminder at " + s.time;
    } else {
      status.textContent = "Get a daily reminder to complete your activities";
    }
  }
}

function toggleNotif(){
  var s = loadNotifSettings();
  if(!s.enabled){
    if(!("Notification" in window)){
      alert("Notifications are not supported on this browser.");
      return;
    }
    if(Notification.permission === "denied"){
      alert("Notifications are blocked. Please enable them in your browser site settings, then try again.");
      return;
    }
    if(Notification.permission !== "granted"){
      Notification.requestPermission().then(function(perm){
        if(perm === "granted"){
          s.enabled = true;
          saveNotifSettings(s);
          renderNotifUI();
          scheduleNotif();
          new Notification("My Daily App", { body: "Reminders enabled! We will remind you at " + s.time + " daily.", icon: "icon-192.png" });
        } else {
          renderNotifUI();
        }
      });
      return;
    }
    s.enabled = true;
  } else {
    s.enabled = false;
    if(notifTimer){ clearTimeout(notifTimer); notifTimer = null; }
  }
  saveNotifSettings(s);
  renderNotifUI();
  if(s.enabled) scheduleNotif();
}

function setNotifTime(){
  var inp = document.getElementById("notifTimeInp");
  var s = loadNotifSettings();
  s.time = inp.value;
  saveNotifSettings(s);
  renderNotifUI();
  if(s.enabled) scheduleNotif();
}

function scheduleNotif(){
  if(notifTimer){ clearTimeout(notifTimer); notifTimer = null; }
  var s = loadNotifSettings();
  if(!s.enabled) return;
  if(!("Notification" in window) || Notification.permission !== "granted") return;

  var parts = s.time.split(":");
  var h = parseInt(parts[0]);
  var m = parseInt(parts[1]);

  var now = new Date();
  var next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
  if(next.getTime() <= now.getTime()){
    next.setDate(next.getDate() + 1);
  }
  var delay = next.getTime() - now.getTime();

  notifTimer = setTimeout(function(){
    fireNotif();
    scheduleNotif();
  }, delay);
}

function fireNotif(){
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  var key = tKey();
  var day = getDay(key);
  var doneCount = 0;
  for(var i=0; i<day.activities.length; i++){
    if(day.activities[i].done) doneCount++;
  }
  var total = day.activities.length;
  var body;
  if(doneCount === total && total > 0){
    body = "Great job! You completed all " + total + " activities today.";
  } else {
    body = "You have " + (total-doneCount) + " of " + total + " activities left today. Keep going!";
  }
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(function(reg){
        if(reg.showNotification){
          reg.showNotification("My Daily App", { body: body, icon: "icon-192.png" });
        } else {
          new Notification("My Daily App", { body: body, icon: "icon-192.png" });
        }
      });
    } else {
      new Notification("My Daily App", { body: body, icon: "icon-192.png" });
    }
  }catch(e){
    try{ new Notification("My Daily App", { body: body }); }catch(e2){}
  }
}
